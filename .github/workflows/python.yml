name: tests

on:
  push:
    paths: ["python/**"]
  pull_request:
    paths: ["python/**"]

defaults:
  run:
    working-directory: python

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

  test-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with torch
        run: pip install -e ".[dev,torch]"
      - name: Run tests (torch backend)
        run: python -m pytest tests/ -q -k "numpy or torch"

  test-jax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with jax
        run: pip install -e ".[dev,jax]"
      - name: Run tests (jax backend)
        run: python -m pytest tests/ -q -k "numpy or jax"
